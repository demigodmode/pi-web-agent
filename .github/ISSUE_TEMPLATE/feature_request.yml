name: Feature request
description: Suggest an improvement or new capability
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the workflow or outcome you want.
    validations:
      required: true

  - type: textarea
    id: current-limitation
    attributes:
      label: What is missing today?
      description: Explain what current pi-web-agent behavior does not cover.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Possible solution
      description: If you have a specific design or API in mind, describe it here.
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Links, prompts, prior art, or concrete examples that would help explain the request.
    validations:
      required: false
