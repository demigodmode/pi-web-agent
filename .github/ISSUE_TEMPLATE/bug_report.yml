name: Bug report
description: Something is broken or returning unusable results
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include as much detail as you can; vague reports are hard to reproduce.

  - type: input
    id: pi-version
    attributes:
      label: Pi version
      description: Run `pi --version` if you are not sure.
      placeholder: "0.69.0"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: pi-web-agent package version
      description: The installed `@demigodmode/pi-web-agent` version, if known.
      placeholder: "0.5.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 15 / Ubuntu 24.04 / WSL / etc."
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - pi install npm:@demigodmode/pi-web-agent
        - local repo extension
        - not sure
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Exact prompt used
      description: Paste the exact prompt/message you sent to Pi.
      placeholder: "Find current docs for ..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened?
      description: Include the error, bad output, or behavior you saw.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: web-agent-show
    attributes:
      label: "Does `/web-agent show` work?"
      options:
        - "Yes"
        - "No"
        - "I did not try"
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: "`/web-agent doctor` output"
      description: Run `/web-agent doctor` in Pi and paste the full output.
      render: text
    validations:
      required: true

  - type: textarea
    id: startup-logs
    attributes:
      label: Terminal logs printed when Pi was launched
      description: Paste any warnings/errors printed in the terminal before or during the session.
      render: text
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Screenshots, exported session snippets, config files, or anything else that might help.
    validations:
      required: false
