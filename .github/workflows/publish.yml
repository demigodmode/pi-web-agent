name: Publish package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

  publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          token: ''
      - run: npm config delete //registry.npmjs.org/:_authToken
      - run: |
          OIDC=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r '.value')
          npm config set "//registry.npmjs.org/:_authToken" "$OIDC"
      - run: node -v
      - run: npm -v
      - run: npm ci
      - run: npm install --no-save @rollup/rollup-linux-x64-gnu
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm publish --access public --provenance
      - if: failure()
        run: cat ~/.npm/_logs/*.log 2>/dev/null | tail -80 || echo "no debug log found"
