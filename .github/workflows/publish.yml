name: Publish package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.4.0
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/release-notes.mjs "$TAG_NAME" release-notes.md
      - run: gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

  publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          token: ''
      - run: node -v
      - run: npm -v
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx --yes npm@11.13.0 publish --access public --provenance
      - if: failure()
        run: cat ~/.npm/_logs/*.log 2>/dev/null | tail -80 || echo "no debug log found"
